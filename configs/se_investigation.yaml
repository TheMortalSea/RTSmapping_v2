# SE Channel Investigation Configuration
# Phase 1: scripts/channel_correlation.py
# Phase 2: scripts/se_variants.py

seed: 42
se_year: 2024

gcs:
  bucket: "abrupt_thaw"
  labels_prefix: "RTS_MODEL_V2/DATA/labels"
  rgb_prefix: "RTS_MODEL_V2/DATA/PLANET-RGB"

paths:
  vis_dir: "plots/extra_channel_vis"
  cache_dir: "plots/extra_channel_vis/.cache"
  correlation_output: "plots/extra_channel_vis/se_derived/correlation"
  variants_output: "plots/extra_channel_vis/se_derived/variants"
  comparison_output: "plots/extra_channel_vis/se_derived/variants/comparison"

correlation:
  n_held_out: 150
  boundary_distance_px: 10
  max_pixels_per_regime: 2000000  # subsample if exceeds, for speed

se_variants:
  k_sweep: [3, 5, 8, 12]
  negative_sample_tiles: 200      # tiles to sample negative pixels from
  negative_max_points: 50000
  prototype_max_points: 50000
  prototype_chunk_size: 5000
