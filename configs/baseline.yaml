# Baseline config for Phase 0 data pipeline.
# Training-specific fields (model, lr, scheduler, ema, etc.) are stubs — Phase 1 fills them.
# See training/training.md for field semantics.

seed: 42
deterministic: true

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  version: "2.0"

  # data_root can be any URI rasterio understands:
  #   gs://abruptthawmapping/training/v2.0        (requires GOOGLE_APPLICATION_CREDENTIALS)
  #   /data/training/v2.0                          (gcsfuse mount inside Docker)
  #   ./tests/fixtures/v2.0                        (synthetic fixtures for local pytest)
  data_root: "gs://abruptthawmapping/training/v2.0"

  # Directory/file names inside data_root. Keep these fixed — change data_root, not these.
  rgb_dir: "PLANET-RGB"
  extra_dir: "EXTRA"
  labels_dir: "labels"
  metadata_csv: "metadata.csv"
  splits_yaml: "splits.yaml"
  splits_summary_json: "splits_summary.json"

  tile_size: 512
  crs: "EPSG:3857"
  label_ignore_index: 255

  # Where compute_normalization_stats.py writes output.
  # Will also be copied alongside each checkpoint (travels with model — see training.md §4).
  normalization_stats_path: "gs://abruptthawmapping/training/v2.0/normalization_stats.json"

# ---------------------------------------------------------------------------
# Channels — RGB is fixed; EXTRA is user-declared.
# ---------------------------------------------------------------------------
# EXTRA is a list of {name, band} entries. `name` is an arbitrary label used by
# normalization_stats and logs; `band` is the 0-indexed band number inside the
# EXTRA GeoTIFF. Change the stacked EXTRA bands on disk → edit this list. No code change.
#
# Example below uses the Sentinel-2 / ArcticDEM set from data/data.md §9,
# but ANY multi-band EXTRA raster works as long as bands line up.
channels:
  rgb: true         # always 3 bands (R, G, B) from PLANET-RGB/
  extra: []         # baseline is RGB-only. Example when enabled:
                    # extra:
                    #   - {name: ndvi, band: 0}
                    #   - {name: nir,  band: 1}
                    #   - {name: re,   band: 2}
                    #   - {name: sr,   band: 3}

# ---------------------------------------------------------------------------
# Splits (generated by scripts/create_splits.py from metadata + domain regions)
# ---------------------------------------------------------------------------
splits:
  # Region boundaries for the spatial-block split.
  regions_geojson: "domain/circumpolar_subregions.geojson"

  # Target ratios; create_splits.py enforces the four priority-ordered constraints
  # (see data/data.md §6): test ≥100 positives, val ≥2 ecoregions, train ≥70% positives, ±10% drift.
  train_fraction: 0.80
  val_fraction: 0.10
  test_fraction: 0.10
  min_test_positives: 100
  min_val_ecoregions: 2
  min_train_positive_fraction: 0.70
  max_drift: 0.10

# ---------------------------------------------------------------------------
# Normalization (per-dataset stats; see data/data.md §5)
# ---------------------------------------------------------------------------
normalization:
  # One-off percentage clipping of outliers before mean/std computation.
  # Set after inspecting histograms with compute_normalization_stats.py --histograms-only.
  rgb_clip_percentiles: [0.1, 99.9]
  extra_clip_percentiles: [0.1, 99.9]

# ---------------------------------------------------------------------------
# Sampling: balanced batches + curriculum schedule (training.md §7)
# ---------------------------------------------------------------------------
sampling:
  balanced: true
  positive_fraction: 0.5  # per-batch fraction of positive tiles (before curriculum kicks in)
  curriculum_schedule:
    # Step-wise at epoch boundaries. Key = inclusive epoch range; value = negatives per positive.
    "1-10":     1    # 1:1
    "11-30":    5    # 1:5
    "31-50":   10    # 1:10
    "51-100":  15    # 1:15
    "101-300": 20    # 1:20

# ---------------------------------------------------------------------------
# Augmentation (training.md §9.2). Applied only in train split.
# ---------------------------------------------------------------------------
augmentation:
  geometric:
    rot90_p: 0.5
    hflip_p: 0.5
    vflip_p: 0.5
    shift_scale_rotate:
      shift: 0.1
      scale: 0.2
      rotate: 45
      p: 0.5
    elastic:
      alpha: 120
      sigma: 6
      p: 0.3
    shear:
      shear_degrees: 10
      p: 0.3
  color:  # RGB channels only; passed as additional_targets
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    brightness_contrast_p: 0.5
    gaussian_noise:
      var_limit: [10, 50]
      p: 0.3
    clahe:
      clip_limit: 4.0
      tile_grid: [8, 8]
      p: 0.2
  multi_scale:
    scale_range: [0.5, 1.0]
    p: 0.3

# ---------------------------------------------------------------------------
# Loss — boundary_handling is consumed by data/transforms.py in Phase 0.
# The focal loss itself is built in Phase 1 under losses/.
# ---------------------------------------------------------------------------
loss:
  function: "focal"
  focal_gamma: 2.0
  focal_alpha: 0.25
  boundary_handling: "none"     # none | ignore | soft_labels
  boundary_ignore_width: 3
  soft_label_value: 0.05

# ---------------------------------------------------------------------------
# Training loop (Phase 1 will wire these; stubs for now so the config is stable)
# ---------------------------------------------------------------------------
training:
  batch_size: 32
  max_epochs: 300
  val_frequency: 5
  early_stopping:
    patience: 20
    min_delta: 0.005
    start_epoch: 50
    metric: "val_realistic_pr_auc_ratio_200"
  mixed_precision: true
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  drop_last: true

optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-2
  gradient_clip_norm: 1.0

lr_schedule:
  frozen_lr: 1.0e-3           # Phase 1: decoder-only
  base_lr: 1.0e-4             # Phase 2: full fine-tune
  backbone_lr_multiplier: 0.1
  freeze_backbone_epochs: 10
  scheduler: "cosine"
  warmup_epochs: 5
  warmup_start_lr: 1.0e-6
  min_lr: 1.0e-6

ema:
  enabled: true
  decay: 0.999

model:
  architecture: "unetplusplus"
  backbone: "efficientnet-b5"
  pretrained: true
  input_size: 512
  # input_channels is derived from `channels` (3 if extra=[], else 3 + len(extra))

# ---------------------------------------------------------------------------
# Experiment tracking
# ---------------------------------------------------------------------------
mlflow:
  tracking_uri: "gs://abruptthawmapping/mlflow/"
  experiment_name: "rts-segmentation-v2"
  run_name: "baseline"
