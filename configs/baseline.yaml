# Baseline config for RTS Segmentation v2 — data pipeline (Phase 0) + training loop (Phase 1).
# See training/training.md and inference/inference.md for field semantics and
# train-inference consistency contract (§4 of training.md).

seed: 42
deterministic: false   # exploration runs; set true in configs/final_seed.yaml for the [42,43,44] triplet

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  version: "2.0"

  # data_root can be any URI rasterio understands:
  #   gs://abruptthawmapping/training/v2.0        (requires GOOGLE_APPLICATION_CREDENTIALS)
  #   /data/training/v2.0                          (gcsfuse mount inside Docker)
  #   ./tests/fixtures/v2.0                        (synthetic fixtures for local pytest)
  data_root: "gs://abrupt_thaw/RTS_MODEL_V2/DATA/TRAINING_DATA"

  # Directory/file names inside data_root. Keep these fixed — change data_root, not these.
  rgb_dir: "PLANET-RGB"
  extra_dir: "EXTRA"
  labels_dir: "labels"
  metadata_csv: "metadata.csv"
  splits_yaml: "splits.yaml"
  splits_summary_json: "splits_summary.json"

  tile_size: 512
  crs: "EPSG:3857"
  label_ignore_index: 255

  # Where compute_normalization_stats.py writes output.
  # Will also be copied alongside each checkpoint (travels with model — see training.md §4).
  normalization_stats_path: "gs://abrupt_thaw/RTS_MODEL_V2/DATA/TRAINING_DATA/normalization_stats.json"

# ---------------------------------------------------------------------------
# Channels — RGB is fixed; EXTRA is user-declared.
# ---------------------------------------------------------------------------
# EXTRA is a list of {name, band} entries. `name` is an arbitrary label used by
# normalization_stats and logs; `band` is the 0-indexed band number inside the
# EXTRA GeoTIFF. The v2.0 disk layout and its 8 bands are fixed in
# `data/data.md §9` (single source of truth); experiment configs choose subsets.
channels:
  rgb: true         # always 3 bands (R, G, B) from PLANET-RGB/
  extra: []         # baseline is RGB-only. Example loading the NDVI group:
                    # extra:
                    #   - {name: ndvi, band: 0}
                    # Full-stack example (per data/data.md §9):
                    # extra:
                    #   - {name: ndvi,      band: 0}
                    #   - {name: nbr,       band: 1}
                    #   - {name: se_pca_1,  band: 2}
                    #   - {name: se_pca_2,  band: 3}
                    #   - {name: se_pca_3,  band: 4}
                    #   - {name: se_proto,  band: 5}
                    #   - {name: tc_1,      band: 6}
                    #   - {name: tc_2,      band: 7}

# ---------------------------------------------------------------------------
# Splits (generated by scripts/create_splits.py from metadata + domain regions)
# ---------------------------------------------------------------------------
splits:
  # Region boundaries for the spatial-block split.
  regions_geojson: "gs://abrupt_thaw/RTS_MODEL_V2/DATA/circumpolar_subregions.geojson"

  # Target ratios; create_splits.py enforces the four priority-ordered constraints
  # (see data/data.md §6): test ≥100 positives, val ≥2 ecoregions, train ≥70% positives, ±10% drift.
  train_fraction: 0.80
  val_fraction: 0.10
  test_fraction: 0.10
  min_test_positives: 100
  min_val_ecoregions: 2
  min_train_positive_fraction: 0.70
  max_drift: 0.10

# ---------------------------------------------------------------------------
# Normalization (per-dataset stats; see data/data.md §5)
# ---------------------------------------------------------------------------
normalization:
  # RESERVED — currently unimplemented. compute_normalization_stats.py runs
  # Welford on raw values (no clipping). Keys retained so that adding
  # percentile-clipping in v2.1 does not require a config-schema change.
  # If real-data stats reveal saturation/zero-fill skew, implement clipping
  # in scripts/compute_normalization_stats.py and update data/data.md §4.1.
  # Per-group EXTRA normalization design intent lives in data/data.md §9.
  rgb_clip_percentiles: [0.1, 99.9]
  extra_clip_percentiles: [0.1, 99.9]

# ---------------------------------------------------------------------------
# Sampling: balanced batches + curriculum schedule (training.md §7)
# ---------------------------------------------------------------------------
sampling:
  balanced: true
  positive_fraction: 0.5  # per-batch fraction of positive tiles (before curriculum kicks in)
  curriculum_schedule:
    # Step-wise at epoch boundaries. Key = inclusive epoch range; value = negatives per positive.
    "1-10":     1    # 1:1
    "11-30":    5    # 1:5
    "31-50":   10    # 1:10
    "51-100":  15    # 1:15
    "101-300": 20    # 1:20

# ---------------------------------------------------------------------------
# Augmentation (training.md §9.2). Applied only in train split.
# ---------------------------------------------------------------------------
augmentation:
  geometric:
    rot90_p: 0.5
    hflip_p: 0.5
    vflip_p: 0.5
    shift_scale_rotate:
      shift: 0.1
      scale: 0.2
      rotate: 45
      p: 0.5
    elastic:
      alpha: 120
      sigma: 6
      p: 0.3
    shear:
      shear_degrees: 10
      p: 0.3
  color:  # RGB channels only; passed as additional_targets
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    brightness_contrast_p: 0.5
    gaussian_noise:
      var_limit: [10, 50]
      p: 0.3
    clahe:
      clip_limit: 4.0
      tile_grid: [8, 8]
      p: 0.2
  multi_scale:
    scale_range: [0.5, 1.0]
    p: 0.3

# ---------------------------------------------------------------------------
# Loss — boundary_handling is consumed by data/transforms.py in Phase 0.
# The focal loss itself is built in Phase 1 under losses/.
# ---------------------------------------------------------------------------
loss:
  function: "focal"             # focal | dice | tversky | compound (training.md §5)
  focal_gamma: 2.0              # tuning range [1, 2, 3, 5] per training.md §5.1
  focal_alpha: 0.25             # tuning range [0.1, 0.25, 0.5, 0.75]
  # ── compound (focal + dice) — used when function == "compound" (training.md §5.3):
  lambda_focal: 1.0             # tuning range [0.5, 1.0, 2.0]
  lambda_dice: 1.0              # tuning range [0.5, 1.0, 2.0]
  # ── tversky — used when function == "tversky" (training.md §5.2):
  tversky_alpha: 0.3            # FN weight
  tversky_beta: 0.7             # FP weight; β > α for precision-focused training
  tversky_eps: 1.0
  # ── dice smoothing (also used inside compound):
  dice_eps: 1.0
  boundary_handling: "none"     # none | ignore  (soft_labels deferred to v2.1)
  boundary_ignore_width: 3
  soft_label_value: 0.05

# ---------------------------------------------------------------------------
# Training loop (Phase 1 will wire these; stubs for now so the config is stable)
# ---------------------------------------------------------------------------
training:
  batch_size: 32
  max_epochs: 300
  val_frequency: 5
  early_stopping:
    # 8 validation events ≈ 40 epochs at val_frequency=5 (training.md §9.1).
    patience: 8
    min_delta: 0.005
    # Gated to epoch 101 — curriculum reaches 1:20 at 101, matching val prevalence.
    # Before 101, val-realistic is evaluated on a harder distribution than the model
    # is currently trained on, risking false early-stop.
    start_epoch: 101
    # Geometric mean of PR-AUC at 1:200/500/1000; 3-validation moving average.
    # Single ratio (e.g. 1:200) would bias model selection toward recall-happy models.
    metric: "val_realistic_pr_auc_geomean"
    # Checkpoint "best" uses the same smoothed metric, not the raw value.
    smoothing_window: 3
  # Precision: bf16 preferred on A100/H100 (wider exponent range, no loss scaling
  # needed — safer under focal loss with extreme imbalance). fp16 fallback for L4.
  precision: "bf16"          # bf16 | fp16 | fp32
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  drop_last: true

  # gcsfuse mount config for training data; applied in docker run (see
  # computing/docker_training.md Part 4). Tile churn under balanced sampling +
  # curriculum negatives exceeds Phase-0 smoke patterns; these flags turn
  # gcsfuse from a thin proxy into a real on-disk cache.
  gcsfuse:
    file_cache_capacity_mb: 20480
    stat_cache_ttl: "24h"
    type_cache_ttl: "24h"
    file_cache_cache_file_for_range_read: true
    metadata_prefetch_on_mount: "async"

optimizer:
  name: "adamw"
  # Per-phase learning rates live under `lr_schedule` (frozen_lr / base_lr);
  # there is no top-level `optimizer.lr` to keep them as the single source.
  weight_decay: 1.0e-2          # tuning knob if Phase 0 shows train-val IoU gap > 0.4
  gradient_clip_norm: 1.0

lr_schedule:
  frozen_lr: 1.0e-3           # Phase 1: decoder-only
  base_lr: 1.0e-4             # Phase 2: full fine-tune
  backbone_lr_multiplier: 0.1
  freeze_backbone_epochs: 10
  scheduler: "warmup_cosine"   # warmup_cosine | lr_range_test (training/scheduler.py)
  warmup_epochs: 5            # decoder warmup after unfreeze
  warmup_start_lr: 1.0e-6
  min_lr: 1.0e-6
  # Separate linear warmup on the backbone param group specifically. Backbone
  # LR jumps 0 → (base_lr × multiplier) = 1e-5 at unfreeze, risking catastrophic
  # forgetting. 3-epoch linear ramp on just the backbone group.
  backbone_warmup_epochs: 3

ema:
  enabled: true
  decay: 0.999

model:
  architecture: "unetplusplus"
  backbone: "efficientnet-b5"
  pretrained: true
  # Input spatial size is derived from `data.tile_size` — model and data must
  # always agree, so there is one source. input_channels is derived from
  # `channels` (3 if extra=[], else 3 + len(extra)).
  # Output: logits (no sigmoid) — see training.md §4.2.
  # Final-conv bias initialized to -log((1-π)/π) to align early sigmoid output
  # with class prior. Reduces first-step loss dominance by negatives (focal
  # paper trick). Real positive-pixel prevalence is ~0.001–0.005 per
  # current_working_status.md; using the upper end gives a small but non-zero
  # negative bias instead of the no-op at π=0.5.
  output_bias_prior: 0.005

# ---------------------------------------------------------------------------
# Metrics (training.md §6; inference-shared values)
# ---------------------------------------------------------------------------
metrics:
  # Minimum connected-component size after thresholding (post-sigmoid).
  # 10 px ≈ 228 m² at 4.77 m/px projected — smaller than any real RTS. Strips speckle FPs.
  # Shared with inference vectorization (inference.md §9.3).
  min_blob_size_px: 10
  # Object-level matching IoU threshold for TP/FP/FN (training.md §6.2).
  object_iou_threshold: 0.3
  # Pixel-level ops threshold for in-training reporting (training.md §6.2).
  # Deployment threshold is set post-calibration in configs/deployment.yaml.
  reporting_threshold: 0.5
  # Fixed 3+3 preview tiles (seeded pass 1 → informed pass 2; see plan Step 5).
  preview_tile_config: "configs/preview_tiles.yaml"

# ---------------------------------------------------------------------------
# Experiment tracking
# ---------------------------------------------------------------------------
mlflow:
  tracking_uri: "gs://abrupt_thaw/RTS_MODEL_V2/mlflow_tracking"
  experiment_name: "rts-segmentation-v2"
  run_name: "baseline"
